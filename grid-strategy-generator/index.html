<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>网格策略 1.0 计划生成器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17222d;
      --muted: #5f6f7d;
      --line: #d9e2e8;
      --panel: #ffffff;
      --accent: #0f6b5b;
      --accent-strong: #095447;
      --accent-soft: #e7f4f0;
      --loss: #a72f35;
      --loss-soft: #fff0f0;
      --background: #f2f6f7;
      --shadow: 0 16px 38px rgba(27, 53, 65, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background:
        radial-gradient(circle at 8% 0%, rgba(15, 107, 91, 0.09), transparent 28rem),
        var(--background);
      color: var(--ink);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    button, input, select { font: inherit; }
    button { touch-action: manipulation; }

    .page-shell {
      width: min(1480px, calc(100% - 24px));
      margin: 0 auto;
      padding: 14px 0 48px;
    }

    .top-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .title-group { min-width: 0; }
    .eyebrow {
      margin: 0 0 2px;
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1, h2 { line-height: 1.25; }
    h1 { margin: 0; font-size: clamp(1.25rem, 2vw, 1.6rem); letter-spacing: -0.02em; }
    h2 { margin: 0 0 20px; font-size: 1.35rem; }
    .hero-copy { margin: 2px 0 0; color: var(--muted); font-size: 0.82rem; }
    .top-actions { display: flex; flex: 0 0 auto; gap: 10px; }
    .top-actions .primary-button { margin-top: 0; }

    .panel {
      margin-top: 24px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .section-heading h2 { margin: 0; }
    .section-heading p { margin: 0; color: var(--muted); font-size: 0.92rem; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px 12px;
    }

    label { display: grid; gap: 4px; color: #273845; font-weight: 700; }
    .helper { color: var(--muted); font-size: 0.75rem; font-weight: 400; line-height: 1.35; }

    input, select {
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid #b8c6d0;
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    input:focus, select:focus, button:focus-visible {
      outline: 3px solid rgba(15, 107, 91, 0.22);
      outline-offset: 2px;
      border-color: var(--accent);
    }

    .step-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .preset-button {
      min-height: 44px;
      padding: 9px 14px;
      border: 1px solid #a9cfc5;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 750;
      cursor: pointer;
    }
    .preset-button:hover { background: #d6ebe5; }
    .preset-button:active { background: #c8e2db; }

    .error {
      margin: 18px 0 0;
      padding: 12px 14px;
      border-left: 4px solid var(--loss);
      border-radius: 6px;
      background: var(--loss-soft);
      color: #81242a;
      font-weight: 650;
    }

    .primary-button {
      min-height: 48px;
      margin-top: 20px;
      padding: 12px 20px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(15, 107, 91, 0.18);
    }
    .primary-button:hover { background: var(--accent-strong); }
    .primary-button:active { box-shadow: none; }

    .app-layout {
      display: grid;
      grid-template-columns: minmax(240px, 280px) minmax(0, 1fr);
      grid-template-areas: "sidebar tool";
      align-items: start;
      gap: 16px;
    }
    .tool-column { grid-area: tool; min-width: 0; }
    .strategy-sidebar { grid-area: sidebar; position: sticky; top: 24px; }
    .strategy-heading { margin-bottom: 12px; }
    .strategy-empty { margin: 0; color: var(--muted); font-size: 0.92rem; }
    .strategy-list { display: grid; gap: 10px; }
    .strategy-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 58px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fbfdfd;
    }
    .strategy-item.is-active {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .strategy-item.is-active .strategy-load strong { font-weight: 800; }
    .strategy-load, .strategy-delete {
      min-height: 52px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }
    .strategy-load { padding: 10px 12px; text-align: left; color: var(--ink); }
    .strategy-load strong, .strategy-load time { display: block; }
    .strategy-load time { margin-top: 2px; color: var(--muted); font-size: 0.78rem; }
    .strategy-delete {
      border-left: 1px solid var(--line);
      color: var(--loss);
      font-size: 0.8rem;
      font-weight: 800;
    }
    .strategy-load:hover, .strategy-delete:hover { background: rgba(15, 107, 91, 0.07); }
    .secondary-button {
      min-height: 48px;
      padding: 11px 18px;
      border: 1px solid #a9cfc5;
      border-radius: 10px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 800;
      cursor: pointer;
    }
    .secondary-button:hover:not(:disabled) { background: #d6ebe5; }
    .secondary-button:disabled { cursor: not-allowed; opacity: 0.48; }
    .save-status { margin: 8px 0 0; color: var(--muted); font-weight: 650; }
    .save-status.is-error { color: var(--loss); }

    .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .parameter-panel, .pressure-panel { margin-top: 12px; padding: 14px 16px; }
    .parameter-panel .section-heading, .pressure-panel .section-heading { margin-bottom: 10px; }
    .pressure-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; }
    .pressure-grid .metric { padding: 9px 10px; border-radius: 10px; }
    .pressure-grid .metric strong { margin-top: 2px; font-size: 0.98rem; }
    .metric {
      min-width: 0;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdfd;
    }
    .metric span { display: block; color: var(--muted); font-size: 0.8rem; }
    .metric strong {
      display: block;
      margin-top: 5px;
      overflow-wrap: anywhere;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
    }
    .metric.loss { border-color: #efc5c7; background: var(--loss-soft); }
    .metric.loss strong { color: var(--loss); }

    .plan-name { margin: -8px 0 18px; color: var(--muted); }
    .plan-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -8px 0 18px;
    }
    .plan-toolbar .plan-name { margin: 0; }
    .table-scroll { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
    table { width: 100%; min-width: 1060px; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    th, td { padding: 12px 11px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th { background: #eef4f4; color: #31434f; font-size: 0.82rem; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #f7faf9; }
    th:first-child, td:first-child { text-align: left; }
    .positive { color: var(--accent-strong); font-weight: 750; }
    .negative { color: var(--loss); font-weight: 750; }
    .note {
      margin: 16px 0 0;
      padding: 12px 14px;
      border-radius: 9px;
      background: #f5f8f9;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .disclaimer { margin: 24px 2px 0; color: var(--muted); font-size: 0.82rem; }
    [hidden] { display: none !important; }

    @media (max-width: 1100px) {
      .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pressure-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 900px) {
      .app-layout {
        grid-template-columns: 1fr;
        grid-template-areas: "tool" "sidebar";
      }
      .strategy-sidebar { position: static; }
    }

    @media (max-width: 820px) {
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 720px) {
      .page-shell { width: min(100% - 20px, 1180px); padding: 26px 0 48px; }
      .top-toolbar { align-items: stretch; flex-direction: column; }
      .top-actions { display: grid; grid-template-columns: 1fr 1fr; }
      .top-actions .primary-button, .top-actions .secondary-button { width: 100%; }
      .form-grid, .metric-grid { grid-template-columns: 1fr; }
      .panel { padding: 18px; border-radius: 14px; }
      .section-heading { display: block; }
      .section-heading p { margin-top: 6px; }
      .plan-toolbar { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <header class="top-toolbar">
      <div class="title-group">
        <p class="eyebrow">固定步长 · 网格策略 1.0</p>
        <h1>网格策略 1.0 生成器</h1>
        <p class="hero-copy">设置参数、检查资金压力，再制定每档买卖计划。</p>
      </div>
      <div class="top-actions" aria-label="策略操作">
        <button class="primary-button" type="submit" form="grid-form">生成网格计划</button>
        <button id="save-strategy-button" class="secondary-button" type="button" disabled>保存策略</button>
      </div>
    </header>

    <div class="app-layout">
      <div id="tool-column" class="tool-column">

    <section class="panel parameter-panel" aria-labelledby="parameter-title">
      <div class="section-heading">
        <h2 id="parameter-title">1. 设置参数</h2>
        <p>价格保留三位小数，数量按 100 份向下取整</p>
      </div>
      <form id="grid-form" novalidate>
        <div class="form-grid">
          <label for="symbol-name">标的名称
            <input id="symbol-name" type="text" placeholder="例如：中证500 ETF" autocomplete="off">
          </label>
          <label for="start-price">起始价（元）
            <input id="start-price" type="number" min="0" step="0.001" inputmode="decimal" placeholder="例如：1.000" required>
            <span class="helper">第一档买入价，也是计算固定步长的基准价</span>
          </label>
          <label for="step-pct">步长比例（%）
            <input id="step-pct" type="number" min="0" max="100" step="0.01" inputmode="decimal" value="5" required>
            <span class="helper">实际价格步长 = 起始价 × 步长比例</span>
          </label>
          <label for="max-drop-pct">最大跌幅（%）
            <input id="max-drop-pct" type="number" min="0" max="100" step="0.01" inputmode="decimal" placeholder="例如：40" required>
            <span class="helper">工具会向外多覆盖一档，确保不低于目标跌幅</span>
          </label>
          <label for="funding-mode">资金模式
            <select id="funding-mode">
              <option value="total" selected>限定总资金</option>
              <option value="perGrid">固定每格金额</option>
            </select>
            <span class="helper">限定总资金会把买入费用计入现金上限</span>
          </label>
          <label for="funding-amount"><span id="funding-label">总资金（元）</span>
            <input id="funding-amount" type="number" min="0" step="0.01" inputmode="decimal" placeholder="例如：50000" required>
          </label>
          <label for="fee-pct">单边费率（%）
            <input id="fee-pct" type="number" min="0" step="0.001" inputmode="decimal" value="0">
            <span class="helper">买入和卖出分别计算一次</span>
          </label>
          <label for="profit-retention">留利润策略
            <select id="profit-retention">
              <option value="0" selected>关闭（网格 1.0）</option>
              <option value="1">留 1 份利润</option>
              <option value="2">留 2 份利润</option>
              <option value="3">留 3 份利润</option>
            </select>
            <span class="helper">按税费前利润计算留存，费用另外计入盈亏</span>
          </label>
        </div>
        <div class="step-presets" aria-label="步长快捷值">
          <button class="preset-button" type="button" data-step="5">普通 5%</button>
          <button class="preset-button" type="button" data-step="10">高波动 10%</button>
        </div>
        <p id="error-message" class="error" role="alert" tabindex="-1" hidden></p>
        <p id="save-status" class="save-status" aria-live="polite" hidden></p>
      </form>
    </section>

    <section id="results" hidden>
      <section class="panel pressure-panel" aria-labelledby="pressure-title">
        <div class="section-heading">
          <h2 id="pressure-title">2. 压力测试</h2>
          <p>假设所有买入档都已触发，价格停在最低一档</p>
        </div>
        <div id="pressure-summary" class="metric-grid pressure-grid"></div>
      </section>

      <section id="completion-panel" class="panel" aria-labelledby="completion-title" hidden>
        <div class="section-heading">
          <h2 id="completion-title">3. 每档完成一轮后</h2>
          <p>各档分别完成一次买入和计划卖出</p>
        </div>
        <div id="completion-summary" class="metric-grid"></div>
        <p class="note">综合利润未扣除留存份额未来卖出费用。</p>
      </section>

      <section class="panel table-panel" aria-labelledby="table-title">
        <div class="section-heading">
          <h2 id="table-title">3. 网格计划</h2>
          <p>每档买入后，上涨一个固定步长卖出</p>
        </div>
        <div class="plan-toolbar">
          <p id="plan-title" class="plan-name"></p>
          <button id="export-csv-button" class="preset-button" type="button">导出完整方案 CSV</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr id="grid-table-head"></tr>
            </thead>
            <tbody id="grid-table-body"></tbody>
          </table>
        </div>
        <p class="note"><strong>跳空处理：</strong>若价格跨越多档，应逐档执行；每一档仍按自己的卖出价退出。</p>
      </section>
    </section>

    <p class="disclaimer">本工具只按输入参数生成网格计划，不判断标的价值、未来走势或策略适用性，不构成投资建议。</p>
      </div>
      <aside class="panel strategy-sidebar" aria-labelledby="saved-strategy-title">
        <div class="section-heading strategy-heading">
          <h2 id="saved-strategy-title">已保存策略</h2>
        </div>
        <p id="saved-strategy-empty" class="strategy-empty">暂无已保存策略，生成方案后可保存。</p>
        <div id="saved-strategy-list" class="strategy-list" role="list"></div>
      </aside>
    </div>
  </main>
  <script>
  /* GRID_CALCULATOR_START */
  (() => {
    const MAX_GRID_LEVELS = 500;
    const roundPrice = (value) => Math.round((value + Number.EPSILON) * 1000) / 1000;
    const roundMoney = (value) => Math.round((value + Number.EPSILON) * 100) / 100;
    const roundPct = (value) => Math.round((value + Number.EPSILON) * 100) / 100;

    function positiveNumber(value, label) {
      const number = Number(value);
      if (!Number.isFinite(number) || number <= 0) {
        throw new Error(`${label}必须大于 0`);
      }
      return number;
    }

    function calculateGrid(input) {
      const startPrice = positiveNumber(input.startPrice, "起始价");
      const stepPct = positiveNumber(input.stepPct, "步长比例");
      const maxDropPct = positiveNumber(input.maxDropPct, "最大跌幅");
      const amount = positiveNumber(
        input.amount,
        input.fundingMode === "total" ? "总资金" : "每格金额",
      );
      const feePct = Number(input.feePct ?? 0);
      const profitRetentionMultiple = Number(input.profitRetentionMultiple ?? 0);

      if (!Number.isFinite(feePct) || feePct < 0) {
        throw new Error("费率不能为负数");
      }
      if (![0, 1, 2, 3].includes(profitRetentionMultiple)) {
        throw new Error("留利润策略必须为关闭、留 1 份、留 2 份或留 3 份");
      }
      if (stepPct >= 100 || maxDropPct >= 100) {
        throw new Error("步长比例和最大跌幅必须小于 100%");
      }
      if (!["perGrid", "total"].includes(input.fundingMode)) {
        throw new Error("请选择有效的资金模式");
      }

      const downwardSteps = Math.ceil(maxDropPct / stepPct - 1e-12);
      const levelCount = downwardSteps + 1;
      if (levelCount > MAX_GRID_LEVELS) {
        throw new Error("网格档数不能超过 500 档，请增大步长或减小最大跌幅");
      }
      const rawStep = startPrice * stepPct / 100;
      if (startPrice - downwardSteps * rawStep <= 0) {
        throw new Error("最低档价格必须大于 0");
      }

      const prices = Array.from(
        { length: levelCount },
        (_, index) => roundPrice(startPrice - index * rawStep),
      );
      if (prices.some((price) => !Number.isFinite(price) || price <= 0)) {
        throw new Error("所有档位价格取整后必须大于 0");
      }
      if (prices.some((price, index) => index > 0 && price >= prices[index - 1])) {
        throw new Error("价格步长在三位小数报价下过小");
      }

      const feeRate = feePct / 100;
      const cashPerLevel = input.fundingMode === "total"
        ? amount / levelCount
        : amount * (1 + feeRate);
      const securityBudget = input.fundingMode === "total"
        ? cashPerLevel / (1 + feeRate)
        : amount;

      const levels = prices.map((buyPrice, index) => {
        const sellPrice = index === 0
          ? roundPrice(startPrice + rawStep)
          : prices[index - 1];
        const quantity = Math.floor(securityBudget / buyPrice / 100) * 100;
        if (quantity < 100) {
          throw new Error("每格资金不足以至少买入 100 份");
        }

        const actualBuyAmount = roundMoney(quantity * buyPrice);
        const fullSellAmount = roundMoney(quantity * sellPrice);
        const fullGrossProfit = roundMoney(fullSellAmount - actualBuyAmount);
        const targetSellProceeds = profitRetentionMultiple === 0
          ? fullSellAmount
          : Math.max(
            0,
            actualBuyAmount - (profitRetentionMultiple - 1) * fullGrossProfit,
          );
        const sellQuantity = profitRetentionMultiple === 0
          ? quantity
          : Math.min(
            quantity,
            targetSellProceeds <= 0
              ? 0
              : Math.ceil(targetSellProceeds / sellPrice / 100 - 1e-12) * 100,
          );
        const retainedQuantity = quantity - sellQuantity;
        const sellAmount = roundMoney(sellQuantity * sellPrice);
        const retainedMarketValue = roundMoney(retainedQuantity * sellPrice);
        const buyFee = roundMoney(actualBuyAmount * feeRate);
        const sellFee = roundMoney(sellAmount * feeRate);
        const cashPnl = roundMoney(sellAmount - actualBuyAmount - buyFee - sellFee);
        const combinedProfit = roundMoney(cashPnl + retainedMarketValue);
        const cashReturnPct = roundPct(cashPnl / actualBuyAmount * 100);
        const combinedReturnPct = roundPct(combinedProfit / actualBuyAmount * 100);
        const grossProfit = fullGrossProfit;
        const netProfit = profitRetentionMultiple === 0 ? cashPnl : combinedProfit;

        return {
          index: index + 1,
          buyPrice,
          sellPrice,
          plannedBudget: roundMoney(securityBudget),
          quantity,
          actualBuyAmount,
          fullSellAmount,
          sellQuantity,
          sellAmount,
          retainedQuantity,
          retainedMarketValue,
          buyFee,
          sellFee,
          grossProfit,
          netProfit,
          cashPnl,
          combinedProfit,
          cashReturnPct,
          combinedReturnPct,
          netReturnPct: profitRetentionMultiple === 0 ? cashReturnPct : combinedReturnPct,
        };
      });

      const completion = {
        totalSellProceeds: roundMoney(levels.reduce((sum, row) => sum + row.sellAmount, 0)),
        totalRetainedQuantity: levels.reduce((sum, row) => sum + row.retainedQuantity, 0),
        totalRetainedMarketValue: roundMoney(
          levels.reduce((sum, row) => sum + row.retainedMarketValue, 0),
        ),
        totalCashPnl: roundMoney(levels.reduce((sum, row) => sum + row.cashPnl, 0)),
        totalCombinedProfit: roundMoney(
          levels.reduce((sum, row) => sum + row.combinedProfit, 0),
        ),
      };
      const totalQuantity = levels.reduce((sum, row) => sum + row.quantity, 0);
      const maxCashUsed = roundMoney(
        levels.reduce((sum, row) => sum + row.actualBuyAmount + row.buyFee, 0),
      );
      const plannedCash = roundMoney(
        input.fundingMode === "total" ? amount : cashPerLevel * levelCount,
      );
      const plannedSecurityPrincipal = roundMoney(securityBudget * levelCount);
      const lowestPrice = levels.at(-1).buyPrice;
      const marketValueAtBottom = roundMoney(totalQuantity * lowestPrice);
      const unrealizedPnl = roundMoney(marketValueAtBottom - maxCashUsed);

      return {
        meta: {
          rawStep: roundPrice(rawStep),
          coveragePct: roundPct(downwardSteps * stepPct),
          levelCount,
          fundingMode: input.fundingMode,
          profitRetentionMultiple,
        },
        levels,
        completion,
        pressure: {
          plannedSecurityPrincipal,
          plannedCash,
          maxCashUsed,
          unusedCash: roundMoney(plannedCash - maxCashUsed),
          totalQuantity,
          averageCost: roundPrice(maxCashUsed / totalQuantity),
          lowestPrice,
          marketValueAtBottom,
          unrealizedPnl,
          unrealizedPnlPct: roundPct(unrealizedPnl / maxCashUsed * 100),
        },
      };
    }

    window.GridCalculator = { calculateGrid, roundPrice, roundMoney, roundPct };
  })();
  /* GRID_CALCULATOR_END */
  </script>
  <script>
  /* GRID_EXPORT_START */
  (() => {
    function escapeCsvCell(value) {
      const text = String(value ?? "");
      return /[",\r\n]/.test(text)
        ? `"${text.replaceAll('"', '""')}"`
        : text;
    }

    function serializeCsv(rows) {
      return `\uFEFF${rows.map((row) => row.map(escapeCsvCell).join(",")).join("\r\n")}`;
    }

    function formatTimestamp(date) {
      const pad = (value) => String(value).padStart(2, "0");
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate()),
        "-",
        pad(date.getHours()),
        pad(date.getMinutes()),
        pad(date.getSeconds()),
      ].join("");
    }

    function sanitizeFilenamePart(value) {
      return String(value ?? "")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/-+/g, "-")
        .replace(/[. ]+$/g, "");
    }

    function createExportFilename(symbol, date = new Date()) {
      return `${sanitizeFilenamePart(symbol)}-网格策略-${formatTimestamp(date)}.csv`;
    }

    function buildGridCsv(input, result) {

      const retentionMultiple = Number(input.profitRetentionMultiple ?? 0);
      const retentionLabel = retentionMultiple === 0
        ? "关闭（网格 1.0）"
        : `留 ${retentionMultiple} 份利润`;
      const retentionEnabled = retentionMultiple > 0;
      const rows = [
        ["输入参数", "数值"],
        ["起始价格", Number(input.startPrice).toFixed(3)],
        ["步长比例", `${Number(input.stepPct).toFixed(2)}%`],
        ["最大跌幅", `${Number(input.maxDropPct).toFixed(2)}%`],
        ["资金模式", fundingModeLabel],
        [fundingLabel, Number(input.amount).toFixed(2)],
        ["单边费率", `${Number(input.feePct).toFixed(3)}%`],
        ["留利润策略", retentionLabel],
        [],
        ["压力测试", "数值"],
        ["实际价格步长", result.meta.rawStep.toFixed(3)],
        ["覆盖跌幅", `${result.meta.coveragePct.toFixed(2)}%`],
        ["网格档数", result.meta.levelCount],
        ["证券本金预算", result.pressure.plannedSecurityPrincipal.toFixed(2)],
        ["计划现金", result.pressure.plannedCash.toFixed(2)],
        ["最大实际投入", result.pressure.maxCashUsed.toFixed(2)],
        ["未使用现金", result.pressure.unusedCash.toFixed(2)],
        ["总持仓", result.pressure.totalQuantity],
        ["平均成本", result.pressure.averageCost.toFixed(3)],
        ["最低买入价", result.pressure.lowestPrice.toFixed(3)],
        ["最低档情景-持仓总市值", result.pressure.marketValueAtBottom.toFixed(2)],
        ["最低档浮亏", result.pressure.unrealizedPnl.toFixed(2)],
        ["最低档浮亏比例", `${result.pressure.unrealizedPnlPct.toFixed(2)}%`],
      ];

      if (retentionEnabled) {
        rows.push(
          [],
          ["每档完成一轮后", "数值"],
          ["累计卖出回款", result.completion.totalSellProceeds.toFixed(2)],
          ["累计留存份额", result.completion.totalRetainedQuantity],
          ["累计留存市值", result.completion.totalRetainedMarketValue.toFixed(2)],
          ["累计现金盈亏", result.completion.totalCashPnl.toFixed(2)],
          ["累计综合利润", result.completion.totalCombinedProfit.toFixed(2)],
          [],
          ["序号", "档位", "买入价格", "卖出价格", "买入数量", "买入金额", "卖出数量", "卖出回款", "留存数量", "留存市值", "现金盈亏", "综合利润", "现金收益率", "综合收益率"],
          ...result.levels.map((row) => [
            row.index,
            row.buyPrice.toFixed(3),
            row.buyPrice.toFixed(3),
            row.sellPrice.toFixed(3),
            row.quantity,
            row.actualBuyAmount.toFixed(2),
            row.sellQuantity,
            row.sellAmount.toFixed(2),
            row.retainedQuantity,
            row.retainedMarketValue.toFixed(2),
            row.cashPnl.toFixed(2),
            row.combinedProfit.toFixed(2),
            `${row.cashReturnPct.toFixed(2)}%`,
            `${row.combinedReturnPct.toFixed(2)}%`,
          ]),
        );
      } else {
        rows.push(
          [],
          ["序号", "档位", "买入价格", "卖出价格", "买入数量", "买入金额", "卖出数量", "卖出金额", "盈利金额", "盈利比例"],
          ...result.levels.map((row) => [
            row.index,
            row.buyPrice.toFixed(3),
            row.buyPrice.toFixed(3),
            row.sellPrice.toFixed(3),
            row.quantity,
            row.actualBuyAmount.toFixed(2),
            row.quantity,
            row.sellAmount.toFixed(2),
            row.netProfit.toFixed(2),
            `${row.netReturnPct.toFixed(2)}%`,
          ]),
        );
      }
      return serializeCsv(rows);
    }

    window.GridExporter = {
      buildGridCsv,
      createExportFilename,
      escapeCsvCell,
      formatTimestamp,
      sanitizeFilenamePart,
      serializeCsv,
    };
  })();
  /* GRID_EXPORT_END */
  </script>
  <script>
  /* GRID_STRATEGY_STORE_START */
  (() => {
    const STORE_VERSION = 1;
    const ALLOWED_FUNDING_MODES = new Set(["total", "perGrid"]);
    const ALLOWED_RETENTION_MULTIPLES = new Set([0, 1, 2, 3]);

    function normalizeInput(input) {
      const normalized = {
        startPrice: String(input?.startPrice ?? ""),
        stepPct: String(input?.stepPct ?? ""),
        maxDropPct: String(input?.maxDropPct ?? ""),
        fundingMode: String(input?.fundingMode ?? ""),
        amount: String(input?.amount ?? ""),
        feePct: String(input?.feePct ?? "0"),
        profitRetentionMultiple: Number(input?.profitRetentionMultiple),
      };
      const startPrice = Number(normalized.startPrice);
      const stepPct = Number(normalized.stepPct);
      const maxDropPct = Number(normalized.maxDropPct);
      const amount = Number(normalized.amount);
      const feePct = Number(normalized.feePct);
      if (
        !Number.isFinite(startPrice)
        || startPrice <= 0
        || !Number.isFinite(stepPct)
        || stepPct <= 0
        || stepPct >= 100
        || !Number.isFinite(maxDropPct)
        || maxDropPct <= 0
        || maxDropPct >= 100
        || !Number.isFinite(amount)
        || amount <= 0
        || !Number.isFinite(feePct)
        || feePct < 0
        || !ALLOWED_FUNDING_MODES.has(normalized.fundingMode)
        || !ALLOWED_RETENTION_MULTIPLES.has(normalized.profitRetentionMultiple)
      ) {
        throw new Error("保存的策略参数无效");
      }
      return normalized;
    }

    function createRecord(symbol, input, savedAt = new Date()) {
      const normalizedSymbol = String(symbol ?? "").trim();
      if (!normalizedSymbol) throw new Error("标的名称不能为空");
      const isoTime = savedAt instanceof Date
        ? savedAt.toISOString()
        : new Date(savedAt).toISOString();
      return {
        version: STORE_VERSION,
        symbol: normalizedSymbol,
        savedAt: isoTime,
        input: normalizeInput(input),
      };
    }

    function normalizeRecord(record) {
      if (record?.version !== STORE_VERSION) throw new Error("保存记录版本无效");
      return createRecord(record.symbol, record.input, record.savedAt);
    }

    function sortNewestFirst(records) {
      return [...records].sort((left, right) => right.savedAt.localeCompare(left.savedAt));
    }

    function upsertRecord(records, record) {
      const normalized = normalizeRecord(record);
      return sortNewestFirst([
        ...records.filter((item) => item.symbol !== normalized.symbol),
        normalized,
      ]);
    }

    function removeRecord(records, symbol) {
      const normalizedSymbol = String(symbol ?? "").trim();
      return records.filter((record) => record.symbol !== normalizedSymbol);
    }

    function parseStore(raw) {
      if (!raw) return { records: [], skippedCount: 0 };
      let envelope;
      try {
        envelope = JSON.parse(raw);
      } catch {
        return { records: [], skippedCount: 1 };
      }
      if (envelope?.version !== STORE_VERSION || !Array.isArray(envelope.records)) {
        return { records: [], skippedCount: 1 };
      }
      const records = [];
      let skippedCount = 0;
      for (const candidate of envelope.records) {
        try {
          const record = normalizeRecord(candidate);
          const existingIndex = records.findIndex((item) => item.symbol === record.symbol);
          if (existingIndex >= 0) records.splice(existingIndex, 1);
          records.push(record);
        } catch {
          skippedCount += 1;
        }
      }
      return { records: sortNewestFirst(records), skippedCount };
    }

    function serializeStore(records) {
      return JSON.stringify({ version: STORE_VERSION, records: records.map(normalizeRecord) });
    }

    window.GridStrategyStore = {
      STORE_VERSION,
      createRecord,
      parseStore,
      removeRecord,
      serializeStore,
      upsertRecord,
    };
  })();
  /* GRID_STRATEGY_STORE_END */
  </script>
  <script>
    const byId = (id) => document.getElementById(id);
    const money = new Intl.NumberFormat("zh-CN", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
    const integer = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });
    const savedAtFormatter = new Intl.DateTimeFormat("zh-CN", {
      dateStyle: "short",
      timeStyle: "short",
    });
    const STRATEGY_STORAGE_KEY = "grid-strategy-generator.saved-strategies.v1";
    const calculationFieldIds = new Set([
      "symbol-name",
      "start-price",
      "step-pct",
      "max-drop-pct",
      "funding-mode",
      "funding-amount",
      "fee-pct",
      "profit-retention",
    ]);
    const saveStrategyButton = byId("save-strategy-button");
    let latestPlan = null;
    let savedStrategies = [];
    let activeSavedSymbol = null;
    let planIsCurrent = false;

    function setSaveStatus(message, isError = false) {
      const status = byId("save-status");
      status.textContent = message;
      status.classList.toggle("is-error", isError);
      status.hidden = !message;
    }

    function setPlanCurrent(isCurrent) {
      planIsCurrent = isCurrent;
      saveStrategyButton.disabled = !planIsCurrent;
    }

    function updateFundingLabel() {
      byId("funding-label").textContent = byId("funding-mode").value === "total"
        ? "总资金（元）"
        : "每格金额（元）";
    }

    function downloadPlanCsv(symbol, plan) {
      const csv = window.GridExporter.buildGridCsv(plan.input, plan.result);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      try {
        const link = document.createElement("a");
        link.href = url;
        link.download = window.GridExporter.createExportFilename(symbol);
        document.body.append(link);
        link.click();
        link.remove();
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    function renderSavedStrategies() {
      const list = byId("saved-strategy-list");
      byId("saved-strategy-empty").hidden = savedStrategies.length > 0;
      list.replaceChildren(...savedStrategies.map((record) => {
        const item = document.createElement("div");
        item.className = "strategy-item";
        item.classList.toggle("is-active", record.symbol === activeSavedSymbol);
        item.setAttribute("role", "listitem");

        const loadButton = document.createElement("button");
        loadButton.type = "button";
        loadButton.className = "strategy-load";
        loadButton.setAttribute("aria-label", `载入 ${record.symbol} 策略`);
        loadButton.addEventListener("click", () => loadStrategy(record));
        const name = document.createElement("strong");
        name.textContent = record.symbol;
        const savedAt = document.createElement("time");
        savedAt.dateTime = record.savedAt;
        savedAt.textContent = savedAtFormatter.format(new Date(record.savedAt));
        loadButton.append(name, savedAt);

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "strategy-delete";
        deleteButton.textContent = "删除";
        deleteButton.setAttribute("aria-label", `删除 ${record.symbol} 策略`);
        deleteButton.addEventListener("click", () => deleteStrategy(record));

        item.append(loadButton, deleteButton);
        return item;
      }));
    }

    function loadSavedStrategies() {
      try {
        const parsed = window.GridStrategyStore.parseStore(
          localStorage.getItem(STRATEGY_STORAGE_KEY),
        );
        savedStrategies = parsed.records;
        if (parsed.skippedCount > 0) {
          setSaveStatus(`有 ${parsed.skippedCount} 条本地策略记录无法读取，已跳过。`, true);
        }
      } catch (error) {
        savedStrategies = [];
        setSaveStatus(`无法读取本地策略：${error.message}`, true);
      }
      renderSavedStrategies();
    }

    function loadStrategy(record) {
      byId("symbol-name").value = record.symbol;
      byId("start-price").value = record.input.startPrice;
      byId("step-pct").value = record.input.stepPct;
      byId("max-drop-pct").value = record.input.maxDropPct;
      byId("funding-mode").value = record.input.fundingMode;
      byId("funding-amount").value = record.input.amount;
      byId("fee-pct").value = record.input.feePct;
      byId("profit-retention").value = String(record.input.profitRetentionMultiple);
      updateFundingLabel();
      activeSavedSymbol = record.symbol;
      renderSavedStrategies();
      setSaveStatus("");
      byId("grid-form").requestSubmit();
    }

    function deleteStrategy(record) {
      const confirmed = window.confirm(
        `确定删除“${record.symbol}”策略吗？已下载的 CSV 不会被删除。`,
      );
      if (!confirmed) return;
      const nextRecords = window.GridStrategyStore.removeRecord(savedStrategies, record.symbol);
      try {
        localStorage.setItem(STRATEGY_STORAGE_KEY,
          window.GridStrategyStore.serializeStore(nextRecords),
        );
        savedStrategies = nextRecords;
        if (activeSavedSymbol === record.symbol) activeSavedSymbol = null;
        renderSavedStrategies();
        setSaveStatus(`已从左侧列表删除“${record.symbol}”。`);
      } catch (error) {
        setSaveStatus(`删除失败：${error.message}`, true);
      }
    }

    function metric(label, value, tone = "") {
      const item = document.createElement("div");
      item.className = `metric ${tone}`.trim();
      const name = document.createElement("span");
      name.textContent = label;
      const number = document.createElement("strong");
      number.textContent = value;
      item.append(name, number);
      return item;
    }

    function renderResult(result) {
      const summary = byId("pressure-summary");
      summary.replaceChildren(
        metric("实际价格步长", result.meta.rawStep.toFixed(3)),
        metric("覆盖跌幅", `${result.meta.coveragePct.toFixed(2)}%`),
        metric("网格档数", `${result.meta.levelCount} 档`),
        metric("证券本金预算", `¥${money.format(result.pressure.plannedSecurityPrincipal)}`),
        metric("计划现金", `¥${money.format(result.pressure.plannedCash)}`),
        metric("最大实际投入", `¥${money.format(result.pressure.maxCashUsed)}`),
        metric("未使用现金", `¥${money.format(result.pressure.unusedCash)}`),
        metric("总持仓", `${integer.format(result.pressure.totalQuantity)} 份`),
        metric("平均成本", result.pressure.averageCost.toFixed(3)),
        metric("最低买入价", result.pressure.lowestPrice.toFixed(3)),
          metric("最低档情景-持仓总市值", `¥${money.format(result.pressure.marketValueAtBottom)}`),
        metric(
          "最低档浮亏",
          `¥${money.format(result.pressure.unrealizedPnl)} (${result.pressure.unrealizedPnlPct.toFixed(2)}%)`,
          "loss",
        ),
      );

      const retentionEnabled = result.meta.profitRetentionMultiple > 0;
      const completionPanel = byId("completion-panel");
      completionPanel.hidden = !retentionEnabled;
      byId("completion-title").textContent = "3. 每档完成一轮后";
      byId("table-title").textContent = retentionEnabled ? "4. 网格计划" : "3. 网格计划";

      if (retentionEnabled) {
        byId("completion-summary").replaceChildren(
          metric("累计卖出回款", `¥${money.format(result.completion.totalSellProceeds)}`),
          metric("累计留存份额", `${integer.format(result.completion.totalRetainedQuantity)} 份`),
          metric("累计留存市值", `¥${money.format(result.completion.totalRetainedMarketValue)}`),
          metric("累计现金盈亏", `¥${money.format(result.completion.totalCashPnl)}`),
          metric("累计综合利润", `¥${money.format(result.completion.totalCombinedProfit)}`),
        );
      } else {
        byId("completion-summary").replaceChildren();
      }

      const headers = retentionEnabled
        ? ["档位", "买入价", "卖出价", "买入数量", "实际买入金额", "卖出数量", "卖出回款", "留存数量", "留存市值", "现金盈亏", "综合利润", "现金收益率", "综合收益率"]
        : ["档位", "买入价", "卖出价", "计划预算", "数量", "实际买入金额", "卖出金额", "税费前利润", "税费后利润", "净收益率"];
      byId("grid-table-head").replaceChildren(...headers.map((label) => {
        const th = document.createElement("th");
        th.scope = "col";
        th.textContent = label;
        return th;
      }));

      const body = byId("grid-table-body");
      body.replaceChildren(...result.levels.map((row) => {
        const tr = document.createElement("tr");
        const values = retentionEnabled
          ? [
            row.index,
            row.buyPrice.toFixed(3),
            row.sellPrice.toFixed(3),
            integer.format(row.quantity),
            money.format(row.actualBuyAmount),
            integer.format(row.sellQuantity),
            money.format(row.sellAmount),
            integer.format(row.retainedQuantity),
            money.format(row.retainedMarketValue),
            money.format(row.cashPnl),
            money.format(row.combinedProfit),
            `${row.cashReturnPct.toFixed(2)}%`,
            `${row.combinedReturnPct.toFixed(2)}%`,
          ]
          : [
            row.index,
            row.buyPrice.toFixed(3),
            row.sellPrice.toFixed(3),
            money.format(row.plannedBudget),
            integer.format(row.quantity),
            money.format(row.actualBuyAmount),
            money.format(row.sellAmount),
            money.format(row.grossProfit),
            money.format(row.netProfit),
            `${row.netReturnPct.toFixed(2)}%`,
          ];
        const profitIndexes = retentionEnabled ? [9, 10, 11, 12] : [8, 9];

        values.forEach((value, index) => {
          const td = document.createElement("td");
          td.textContent = value;
          if (profitIndexes.includes(index)) {
            const profit = retentionEnabled
              ? ([9, 11].includes(index) ? row.cashPnl : row.combinedProfit)
              : row.netProfit;
            td.className = profit >= 0 ? "positive" : "negative";
          }
          tr.append(td);
        });
        return tr;
      }));

      const symbol = byId("symbol-name").value.trim();
      byId("plan-title").textContent = symbol ? `标的：${symbol}` : "未填写标的名称";
      byId("results").hidden = false;
    }

    byId("funding-mode").addEventListener("change", updateFundingLabel);

    for (const button of document.querySelectorAll("[data-step]")) {
      button.addEventListener("click", () => {
        byId("step-pct").value = button.dataset.step;
        setPlanCurrent(false);
        setSaveStatus(latestPlan ? "参数已修改，请重新生成后再保存。" : "");
      });
    }

    for (const eventName of ["input", "change"]) {
      byId("grid-form").addEventListener(eventName, (event) => {
        if (!calculationFieldIds.has(event.target.id)) return;
        setPlanCurrent(false);
        setSaveStatus(latestPlan ? "参数已修改，请重新生成后再保存。" : "");
        if (event.target.id === "symbol-name") {
          activeSavedSymbol = null;
          renderSavedStrategies();
        }
      });
    }

    byId("grid-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const errorBox = byId("error-message");
      errorBox.hidden = true;

      try {
        const input = {
          startPrice: byId("start-price").value,
          stepPct: byId("step-pct").value,
          maxDropPct: byId("max-drop-pct").value,
          fundingMode: byId("funding-mode").value,
          amount: byId("funding-amount").value,
          feePct: byId("fee-pct").value || 0,
          profitRetentionMultiple: Number(byId("profit-retention").value),
        };
        const result = window.GridCalculator.calculateGrid(input);
        latestPlan = { input: { ...input }, result };
        renderResult(result);
        setPlanCurrent(true);
        setSaveStatus("");
      } catch (error) {
        byId("results").hidden = true;
        setPlanCurrent(false);
        errorBox.textContent = `${error.message}，请修改参数后重新生成。`;
        errorBox.hidden = false;
        errorBox.focus();
      }
    });

    byId("export-csv-button").addEventListener("click", () => {
      if (!latestPlan) return;

      const symbolInput = byId("symbol-name");
      const symbol = symbolInput.value.trim();
      const errorBox = byId("error-message");
      if (!symbol) {
        errorBox.textContent = "请先填写标的名称。";
        errorBox.hidden = false;
        symbolInput.focus();
        return;
      }

      errorBox.hidden = true;
      downloadPlanCsv(symbol, latestPlan);
    });

    saveStrategyButton.addEventListener("click", () => {
      const symbolInput = byId("symbol-name");
      const symbol = symbolInput.value.trim();
      if (!symbol) {
        setSaveStatus("请填写标的名称并重新生成网格计划。", true);
        symbolInput.focus();
        return;
      }
      if (!latestPlan) {
        setSaveStatus("请先生成网格计划。", true);
        return;
      }
      if (!planIsCurrent) {
        setSaveStatus("参数已修改，请重新生成后再保存。", true);
        return;
      }

      const record = window.GridStrategyStore.createRecord(symbol, latestPlan.input, new Date());
      const nextRecords = window.GridStrategyStore.upsertRecord(savedStrategies, record);
      let csvSaved = false;
      let indexSaved = false;

      try {
        downloadPlanCsv(symbol, latestPlan);
        csvSaved = true;
      } catch (error) {
        console.error("CSV download failed", error);
      }

      try {
        localStorage.setItem(STRATEGY_STORAGE_KEY,
          window.GridStrategyStore.serializeStore(nextRecords),
        );
        savedStrategies = nextRecords;
        activeSavedSymbol = symbol;
        renderSavedStrategies();
        indexSaved = true;
      } catch (error) {
        console.error("Strategy index save failed", error);
      }

      if (csvSaved && indexSaved) {
        setSaveStatus("策略已保存到左侧列表，CSV 已下载。");
      } else if (csvSaved) {
        setSaveStatus("CSV 已下载，但左侧列表保存失败。", true);
      } else if (indexSaved) {
        setSaveStatus("策略已保存到左侧列表，但 CSV 下载失败。", true);
      } else {
        setSaveStatus("策略保存失败，CSV 和左侧列表均未保存。", true);
      }
    });

    loadSavedStrategies();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>网格策略 1.0 计划生成器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17222d;
      --muted: #5f6f7d;
      --line: #d9e2e8;
      --panel: #ffffff;
      --accent: #0f6b5b;
      --accent-strong: #095447;
      --accent-soft: #e7f4f0;
      --loss: #a72f35;
      --loss-soft: #fff0f0;
      --background: #f2f6f7;
      --shadow: 0 16px 38px rgba(27, 53, 65, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background:
        radial-gradient(circle at 8% 0%, rgba(15, 107, 91, 0.09), transparent 28rem),
        var(--background);
      color: var(--ink);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    button, input, select { font: inherit; }
    button { touch-action: manipulation; }

    .page-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 72px;
    }

    .hero { max-width: 780px; }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1, h2 { line-height: 1.25; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.65rem); letter-spacing: -0.04em; }
    h2 { margin: 0 0 20px; font-size: 1.35rem; }
    .hero-copy { margin: 16px 0 0; color: var(--muted); font-size: 1.05rem; }

    .panel {
      margin-top: 24px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .section-heading h2 { margin: 0; }
    .section-heading p { margin: 0; color: var(--muted); font-size: 0.92rem; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 20px;
    }

    label { display: grid; gap: 7px; color: #273845; font-weight: 700; }
    .helper { color: var(--muted); font-size: 0.82rem; font-weight: 400; }

    input, select {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid #b8c6d0;
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    input:focus, select:focus, button:focus-visible {
      outline: 3px solid rgba(15, 107, 91, 0.22);
      outline-offset: 2px;
      border-color: var(--accent);
    }

    .step-presets { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .preset-button {
      min-height: 44px;
      padding: 9px 14px;
      border: 1px solid #a9cfc5;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 750;
      cursor: pointer;
    }
    .preset-button:hover { background: #d6ebe5; }
    .preset-button:active { background: #c8e2db; }

    .error {
      margin: 18px 0 0;
      padding: 12px 14px;
      border-left: 4px solid var(--loss);
      border-radius: 6px;
      background: var(--loss-soft);
      color: #81242a;
      font-weight: 650;
    }

    .primary-button {
      min-height: 48px;
      margin-top: 20px;
      padding: 12px 20px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(15, 107, 91, 0.18);
    }
    .primary-button:hover { background: var(--accent-strong); }
    .primary-button:active { box-shadow: none; }

    .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .metric {
      min-width: 0;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdfd;
    }
    .metric span { display: block; color: var(--muted); font-size: 0.8rem; }
    .metric strong {
      display: block;
      margin-top: 5px;
      overflow-wrap: anywhere;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
    }
    .metric.loss { border-color: #efc5c7; background: var(--loss-soft); }
    .metric.loss strong { color: var(--loss); }

    .plan-name { margin: -8px 0 18px; color: var(--muted); }
    .plan-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -8px 0 18px;
    }
    .plan-toolbar .plan-name { margin: 0; }
    .table-scroll { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
    table { width: 100%; min-width: 1060px; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    th, td { padding: 12px 11px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th { background: #eef4f4; color: #31434f; font-size: 0.82rem; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover { background: #f7faf9; }
    th:first-child, td:first-child { text-align: left; }
    .positive { color: var(--accent-strong); font-weight: 750; }
    .negative { color: var(--loss); font-weight: 750; }
    .note {
      margin: 16px 0 0;
      padding: 12px 14px;
      border-radius: 9px;
      background: #f5f8f9;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .disclaimer { margin: 24px 2px 0; color: var(--muted); font-size: 0.82rem; }
    [hidden] { display: none !important; }

    @media (max-width: 820px) {
      .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 720px) {
      .page-shell { width: min(100% - 20px, 1180px); padding: 26px 0 48px; }
      .form-grid, .metric-grid { grid-template-columns: 1fr; }
      .panel { padding: 18px; border-radius: 14px; }
      .section-heading { display: block; }
      .section-heading p { margin-top: 6px; }
      .primary-button { width: 100%; }
      .plan-toolbar { align-items: stretch; flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <p class="eyebrow">固定步长 · 网格策略 1.0</p>
      <h1>网格策略 1.0<br>计划生成器</h1>
      <p class="hero-copy">手工设定参数，先查看资金压力，再查看每一档买卖计划。所有计算仅在当前浏览器中完成。</p>
    </header>

    <section class="panel" aria-labelledby="parameter-title">
      <div class="section-heading">
        <h2 id="parameter-title">1. 设置参数</h2>
        <p>价格保留三位小数，数量按 100 份向下取整</p>
      </div>
      <form id="grid-form" novalidate>
        <div class="form-grid">
          <label for="symbol-name">标的名称
            <input id="symbol-name" type="text" placeholder="例如：中证500 ETF" autocomplete="off">
          </label>
          <label for="start-price">起始价（元）
            <input id="start-price" type="number" min="0" step="0.001" inputmode="decimal" placeholder="例如：1.000" required>
            <span class="helper">第一档买入价，也是计算固定步长的基准价</span>
          </label>
          <label for="step-pct">步长比例（%）
            <input id="step-pct" type="number" min="0" max="100" step="0.01" inputmode="decimal" value="5" required>
            <span class="helper">实际价格步长 = 起始价 × 步长比例</span>
          </label>
          <label for="max-drop-pct">最大跌幅（%）
            <input id="max-drop-pct" type="number" min="0" max="100" step="0.01" inputmode="decimal" placeholder="例如：40" required>
            <span class="helper">工具会向外多覆盖一档，确保不低于目标跌幅</span>
          </label>
          <label for="funding-mode">资金模式
            <select id="funding-mode">
              <option value="total" selected>限定总资金</option>
              <option value="perGrid">固定每格金额</option>
            </select>
            <span class="helper">限定总资金会把买入费用计入现金上限</span>
          </label>
          <label for="funding-amount"><span id="funding-label">总资金（元）</span>
            <input id="funding-amount" type="number" min="0" step="0.01" inputmode="decimal" placeholder="例如：50000" required>
          </label>
          <label for="fee-pct">单边费率（%）
            <input id="fee-pct" type="number" min="0" step="0.001" inputmode="decimal" value="0">
            <span class="helper">买入和卖出分别计算一次</span>
          </label>
        </div>
        <div class="step-presets" aria-label="步长快捷值">
          <button class="preset-button" type="button" data-step="5">普通 5%</button>
          <button class="preset-button" type="button" data-step="10">高波动 10%</button>
        </div>
        <p id="error-message" class="error" role="alert" tabindex="-1" hidden></p>
        <button class="primary-button" type="submit">生成网格计划</button>
      </form>
    </section>

    <section id="results" hidden>
      <section class="panel" aria-labelledby="pressure-title">
        <div class="section-heading">
          <h2 id="pressure-title">2. 压力测试</h2>
          <p>假设所有买入档都已触发，价格停在最低一档</p>
        </div>
        <div id="pressure-summary" class="metric-grid"></div>
      </section>

      <section class="panel table-panel" aria-labelledby="table-title">
        <div class="section-heading">
          <h2 id="table-title">3. 网格计划</h2>
          <p>每档买入后，上涨一个固定步长卖出</p>
        </div>
        <div class="plan-toolbar">
          <p id="plan-title" class="plan-name"></p>
          <button id="export-csv-button" class="preset-button" type="button">导出完整方案 CSV</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th scope="col">档位</th>
                <th scope="col">买入价</th>
                <th scope="col">卖出价</th>
                <th scope="col">计划预算</th>
                <th scope="col">数量</th>
                <th scope="col">实际买入金额</th>
                <th scope="col">卖出金额</th>
                <th scope="col">税费前利润</th>
                <th scope="col">税费后利润</th>
                <th scope="col">净收益率</th>
              </tr>
            </thead>
            <tbody id="grid-table-body"></tbody>
          </table>
        </div>
        <p class="note"><strong>跳空处理：</strong>若价格跨越多档，应逐档执行；每一档仍按自己的卖出价退出。</p>
      </section>
    </section>

    <p class="disclaimer">本工具只按输入参数生成网格计划，不判断标的价值、未来走势或策略适用性，不构成投资建议。</p>
  </main>
  <script>
  /* GRID_CALCULATOR_START */
  (() => {
    const MAX_GRID_LEVELS = 500;
    const roundPrice = (value) => Math.round((value + Number.EPSILON) * 1000) / 1000;
    const roundMoney = (value) => Math.round((value + Number.EPSILON) * 100) / 100;
    const roundPct = (value) => Math.round((value + Number.EPSILON) * 100) / 100;

    function positiveNumber(value, label) {
      const number = Number(value);
      if (!Number.isFinite(number) || number <= 0) {
        throw new Error(`${label}必须大于 0`);
      }
      return number;
    }

    function calculateGrid(input) {
      const startPrice = positiveNumber(input.startPrice, "起始价");
      const stepPct = positiveNumber(input.stepPct, "步长比例");
      const maxDropPct = positiveNumber(input.maxDropPct, "最大跌幅");
      const amount = positiveNumber(
        input.amount,
        input.fundingMode === "total" ? "总资金" : "每格金额",
      );
      const feePct = Number(input.feePct ?? 0);

      if (!Number.isFinite(feePct) || feePct < 0) {
        throw new Error("费率不能为负数");
      }
      if (stepPct >= 100 || maxDropPct >= 100) {
        throw new Error("步长比例和最大跌幅必须小于 100%");
      }
      if (!["perGrid", "total"].includes(input.fundingMode)) {
        throw new Error("请选择有效的资金模式");
      }

      const downwardSteps = Math.ceil(maxDropPct / stepPct - 1e-12);
      const levelCount = downwardSteps + 1;
      if (levelCount > MAX_GRID_LEVELS) {
        throw new Error("网格档数不能超过 500 档，请增大步长或减小最大跌幅");
      }
      const rawStep = startPrice * stepPct / 100;
      if (startPrice - downwardSteps * rawStep <= 0) {
        throw new Error("最低档价格必须大于 0");
      }

      const prices = Array.from(
        { length: levelCount },
        (_, index) => roundPrice(startPrice - index * rawStep),
      );
      if (prices.some((price) => !Number.isFinite(price) || price <= 0)) {
        throw new Error("所有档位价格取整后必须大于 0");
      }
      if (prices.some((price, index) => index > 0 && price >= prices[index - 1])) {
        throw new Error("价格步长在三位小数报价下过小");
      }

      const feeRate = feePct / 100;
      const cashPerLevel = input.fundingMode === "total"
        ? amount / levelCount
        : amount * (1 + feeRate);
      const securityBudget = input.fundingMode === "total"
        ? cashPerLevel / (1 + feeRate)
        : amount;

      const levels = prices.map((buyPrice, index) => {
        const sellPrice = index === 0
          ? roundPrice(startPrice + rawStep)
          : prices[index - 1];
        const quantity = Math.floor(securityBudget / buyPrice / 100) * 100;
        if (quantity < 100) {
          throw new Error("每格资金不足以至少买入 100 份");
        }

        const actualBuyAmount = roundMoney(quantity * buyPrice);
        const sellAmount = roundMoney(quantity * sellPrice);
        const buyFee = roundMoney(actualBuyAmount * feeRate);
        const sellFee = roundMoney(sellAmount * feeRate);
        const grossProfit = roundMoney(sellAmount - actualBuyAmount);
        const netProfit = roundMoney(grossProfit - buyFee - sellFee);

        return {
          index: index + 1,
          buyPrice,
          sellPrice,
          plannedBudget: roundMoney(securityBudget),
          quantity,
          actualBuyAmount,
          sellAmount,
          buyFee,
          sellFee,
          grossProfit,
          netProfit,
          netReturnPct: roundPct(netProfit / actualBuyAmount * 100),
        };
      });

      const totalQuantity = levels.reduce((sum, row) => sum + row.quantity, 0);
      const maxCashUsed = roundMoney(
        levels.reduce((sum, row) => sum + row.actualBuyAmount + row.buyFee, 0),
      );
      const plannedCash = roundMoney(
        input.fundingMode === "total" ? amount : cashPerLevel * levelCount,
      );
      const plannedSecurityPrincipal = roundMoney(securityBudget * levelCount);
      const lowestPrice = levels.at(-1).buyPrice;
      const marketValueAtBottom = roundMoney(totalQuantity * lowestPrice);
      const unrealizedPnl = roundMoney(marketValueAtBottom - maxCashUsed);

      return {
        meta: {
          rawStep: roundPrice(rawStep),
          coveragePct: roundPct(downwardSteps * stepPct),
          levelCount,
          fundingMode: input.fundingMode,
        },
        levels,
        pressure: {
          plannedSecurityPrincipal,
          plannedCash,
          maxCashUsed,
          unusedCash: roundMoney(plannedCash - maxCashUsed),
          totalQuantity,
          averageCost: roundPrice(maxCashUsed / totalQuantity),
          lowestPrice,
          marketValueAtBottom,
          unrealizedPnl,
          unrealizedPnlPct: roundPct(unrealizedPnl / maxCashUsed * 100),
        },
      };
    }

    window.GridCalculator = { calculateGrid, roundPrice, roundMoney, roundPct };
  })();
  /* GRID_CALCULATOR_END */
  </script>
  <script>
  /* GRID_EXPORT_START */
  (() => {
    function escapeCsvCell(value) {
      const text = String(value ?? "");
      return /[",\r\n]/.test(text)
        ? `"${text.replaceAll('"', '""')}"`
        : text;
    }

    function serializeCsv(rows) {
      return `\uFEFF${rows.map((row) => row.map(escapeCsvCell).join(",")).join("\r\n")}`;
    }

    function formatTimestamp(date) {
      const pad = (value) => String(value).padStart(2, "0");
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate()),
        "-",
        pad(date.getHours()),
        pad(date.getMinutes()),
        pad(date.getSeconds()),
      ].join("");
    }

    function sanitizeFilenamePart(value) {
      return String(value ?? "")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/-+/g, "-")
        .replace(/[. ]+$/g, "");
    }

    function createExportFilename(symbol, date = new Date()) {
      return `${sanitizeFilenamePart(symbol)}-网格策略-${formatTimestamp(date)}.csv`;
    }

    function buildGridCsv(input, result) {
      const fundingModeLabel = input.fundingMode === "total" ? "限定总资金" : "固定每格金额";
      const fundingLabel = input.fundingMode === "total" ? "总资金（元）" : "每格金额（元）";
      const rows = [
        ["输入参数", "数值"],
        ["起始价格", Number(input.startPrice).toFixed(3)],
        ["步长比例", `${Number(input.stepPct).toFixed(2)}%`],
        ["最大跌幅", `${Number(input.maxDropPct).toFixed(2)}%`],
        ["资金模式", fundingModeLabel],
        [fundingLabel, Number(input.amount).toFixed(2)],
        ["单边费率", `${Number(input.feePct).toFixed(3)}%`],
        [],
        ["压力测试", "数值"],
        ["实际价格步长", result.meta.rawStep.toFixed(3)],
        ["覆盖跌幅", `${result.meta.coveragePct.toFixed(2)}%`],
        ["网格档数", result.meta.levelCount],
        ["证券本金预算", result.pressure.plannedSecurityPrincipal.toFixed(2)],
        ["计划现金", result.pressure.plannedCash.toFixed(2)],
        ["最大实际投入", result.pressure.maxCashUsed.toFixed(2)],
        ["未使用现金", result.pressure.unusedCash.toFixed(2)],
        ["总持仓", result.pressure.totalQuantity],
        ["平均成本", result.pressure.averageCost.toFixed(3)],
        ["最低买入价", result.pressure.lowestPrice.toFixed(3)],
        ["最低档情景-持仓总市值", result.pressure.marketValueAtBottom.toFixed(2)],
        ["最低档浮亏", result.pressure.unrealizedPnl.toFixed(2)],
        ["最低档浮亏比例", `${result.pressure.unrealizedPnlPct.toFixed(2)}%`],
        [],
        ["序号", "档位", "买入价格", "卖出价格", "买入数量", "买入金额", "卖出数量", "卖出金额", "盈利金额", "盈利比例"],
        ...result.levels.map((row) => [
          row.index,
          row.buyPrice.toFixed(3),
          row.buyPrice.toFixed(3),
          row.sellPrice.toFixed(3),
          row.quantity,
          row.actualBuyAmount.toFixed(2),
          row.quantity,
          row.sellAmount.toFixed(2),
          row.netProfit.toFixed(2),
          `${row.netReturnPct.toFixed(2)}%`,
        ]),
      ];
      return serializeCsv(rows);
    }

    window.GridExporter = {
      buildGridCsv,
      createExportFilename,
      escapeCsvCell,
      formatTimestamp,
      sanitizeFilenamePart,
      serializeCsv,
    };
  })();
  /* GRID_EXPORT_END */
  </script>
  <script>
    const byId = (id) => document.getElementById(id);
    const money = new Intl.NumberFormat("zh-CN", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });
    const integer = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });
    let latestPlan = null;

    function metric(label, value, tone = "") {
      const item = document.createElement("div");
      item.className = `metric ${tone}`.trim();
      const name = document.createElement("span");
      name.textContent = label;
      const number = document.createElement("strong");
      number.textContent = value;
      item.append(name, number);
      return item;
    }

    function renderResult(result) {
      const summary = byId("pressure-summary");
      summary.replaceChildren(
        metric("实际价格步长", result.meta.rawStep.toFixed(3)),
        metric("覆盖跌幅", `${result.meta.coveragePct.toFixed(2)}%`),
        metric("网格档数", `${result.meta.levelCount} 档`),
        metric("证券本金预算", `¥${money.format(result.pressure.plannedSecurityPrincipal)}`),
        metric("计划现金", `¥${money.format(result.pressure.plannedCash)}`),
        metric("最大实际投入", `¥${money.format(result.pressure.maxCashUsed)}`),
        metric("未使用现金", `¥${money.format(result.pressure.unusedCash)}`),
        metric("总持仓", `${integer.format(result.pressure.totalQuantity)} 份`),
        metric("平均成本", result.pressure.averageCost.toFixed(3)),
        metric("最低买入价", result.pressure.lowestPrice.toFixed(3)),
          metric("最低档情景-持仓总市值", `¥${money.format(result.pressure.marketValueAtBottom)}`),
        metric(
          "最低档浮亏",
          `¥${money.format(result.pressure.unrealizedPnl)} (${result.pressure.unrealizedPnlPct.toFixed(2)}%)`,
          "loss",
        ),
      );

      const body = byId("grid-table-body");
      body.replaceChildren(...result.levels.map((row) => {
        const tr = document.createElement("tr");
        const values = [
          row.index,
          row.buyPrice.toFixed(3),
          row.sellPrice.toFixed(3),
          money.format(row.plannedBudget),
          integer.format(row.quantity),
          money.format(row.actualBuyAmount),
          money.format(row.sellAmount),
          money.format(row.grossProfit),
          money.format(row.netProfit),
          `${row.netReturnPct.toFixed(2)}%`,
        ];

        values.forEach((value, index) => {
          const td = document.createElement("td");
          td.textContent = value;
          if (index === 8 || index === 9) {
            td.className = row.netProfit >= 0 ? "positive" : "negative";
          }
          tr.append(td);
        });
        return tr;
      }));

      const symbol = byId("symbol-name").value.trim();
      byId("plan-title").textContent = symbol ? `标的：${symbol}` : "未填写标的名称";
      byId("results").hidden = false;
    }

    byId("funding-mode").addEventListener("change", (event) => {
      byId("funding-label").textContent = event.target.value === "total"
        ? "总资金（元）"
        : "每格金额（元）";
    });

    for (const button of document.querySelectorAll("[data-step]")) {
      button.addEventListener("click", () => {
        byId("step-pct").value = button.dataset.step;
      });
    }

    byId("grid-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const errorBox = byId("error-message");
      errorBox.hidden = true;

      try {
        const input = {
          startPrice: byId("start-price").value,
          stepPct: byId("step-pct").value,
          maxDropPct: byId("max-drop-pct").value,
          fundingMode: byId("funding-mode").value,
          amount: byId("funding-amount").value,
          feePct: byId("fee-pct").value || 0,
        };
        const result = window.GridCalculator.calculateGrid(input);
        latestPlan = { input: { ...input }, result };
        renderResult(result);
      } catch (error) {
        byId("results").hidden = true;
        errorBox.textContent = `${error.message}，请修改参数后重新生成。`;
        errorBox.hidden = false;
        errorBox.focus();
      }
    });

    byId("export-csv-button").addEventListener("click", () => {
      if (!latestPlan) return;

      const symbolInput = byId("symbol-name");
      const symbol = symbolInput.value.trim();
      const errorBox = byId("error-message");
      if (!symbol) {
        errorBox.textContent = "请先填写标的名称。";
        errorBox.hidden = false;
        symbolInput.focus();
        return;
      }

      errorBox.hidden = true;
      const csv = window.GridExporter.buildGridCsv(latestPlan.input, latestPlan.result);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = window.GridExporter.createExportFilename(symbol);
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
